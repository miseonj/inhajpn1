<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>word2 — 2과 단어</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1A3550;
    --teal: #28B4A6;
    --orange: #E67E22;
    --white: #ffffff;
    --paper: #faf6ee;
    --light: #eee8d8;
    --muted: #8a7e6f;
    --ink: #2a1a08;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 0 0 40px;
  }

  header {
    width: 100%;
    text-align: center;
    padding: 28px 20px 16px;
  }
  header .label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--teal);
    font-weight: 700;
    margin-bottom: 6px;
  }
  header h1 {
    font-size: 22px;
    font-weight: 900;
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 2px;
  }

  .progress-wrap {
    width: 100%;
    max-width: 400px;
    padding: 0 24px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
  }
  .progress-text {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 8px;
  }
  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--teal);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .card-area {
    width: 100%;
    max-width: 400px;
    padding: 0 24px;
    perspective: 1000px;
    margin-bottom: 24px;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 260px;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }
  .card-inner.flipped {
    transform: rotateY(180deg);
  }

  .card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .card-front {
    background: var(--white);
    border-left: 6px solid var(--teal);
  }
  .card-back {
    background: var(--paper);
    border-left: 6px solid var(--orange);
    transform: rotateY(180deg);
  }

  .front-main {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 52px;
    font-weight: 900;
    color: var(--navy);
    line-height: 1.3;
    text-align: center;
    margin-bottom: 8px;
  }
  .front-main.small {
    font-size: 36px;
  }
  .front-main.xsmall {
    font-size: 26px;
    line-height: 1.6;
  }
  .front-hint {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 12px;
  }

  /* 4개 묶음 카드 */
  .front-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    margin-bottom: 8px;
  }
  .front-group-item {
    background: var(--paper);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
  }
  .front-group-item .jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--navy);
  }
  .front-group-item .kr {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  .back-kana {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--teal);
    margin-bottom: 16px;
    text-align: center;
    line-height: 1.4;
  }
  .back-meaning {
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    text-align: center;
    line-height: 1.5;
  }
  .back-sub {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-top: 10px;
    line-height: 1.6;
  }

  /* 4개 묶음 뒷면 */
  .back-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
  }
  .back-group-item {
    background: white;
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
  }
  .back-group-item .jp {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--teal);
  }
  .back-group-item .kr {
    font-size: 12px;
    color: var(--ink);
    font-weight: 700;
    margin-top: 4px;
  }

  .tap-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  .btn-row {
    display: flex;
    gap: 16px;
    width: 100%;
    max-width: 400px;
    padding: 0 24px;
  }
  .btn {
    flex: 1;
    padding: 16px;
    border-radius: 16px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn:active { transform: scale(0.96); }
  .btn-prev {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-prev:hover { background: rgba(255,255,255,0.13); }
  .btn-next {
    background: var(--teal);
    color: white;
  }
  .btn-next:hover { background: #22a096; }

  .done-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }
  .done-screen.show { display: flex; }
  .done-emoji { font-size: 56px; margin-bottom: 20px; color: var(--teal); font-weight: 900; font-family: 'Noto Sans JP', sans-serif; }
  .done-title {
    font-size: 28px;
    font-weight: 900;
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    margin-bottom: 10px;
  }
  .done-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 32px;
  }
  .btn-restart {
    padding: 16px 40px;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }
</style>
</head>
<body>

<header>
  <div class="label">日本語練習１</div>
  <h1>2과 단어</h1>
</header>

<div class="progress-wrap">
  <div class="progress-text">
    <span id="cur">1</span><span id="total"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
</div>

<div class="card-area" id="cardArea">
  <div class="card-inner" id="cardInner" onclick="flipCard()">
    <div class="card-front" id="cardFront"></div>
    <div class="card-back" id="cardBack"></div>
  </div>
</div>

<div class="tap-hint" id="tapHint">탭해서 뒤집기</div>

<div class="btn-row">
  <button class="btn btn-prev" id="btnPrev" onclick="prevCard()">◀ 이전</button>
  <button class="btn btn-next" id="btnNext" onclick="nextCard()">다음 ▶</button>
</div>

<div class="done-screen" id="doneScreen">
  <div class="done-emoji">完</div>
  <div class="done-title">완료!</div>
  <div class="done-sub">2과 단어 완주했어요</div>
  <button class="btn-restart" onclick="restart()">처음부터 다시</button>
</div>

<script>
// type: 'normal' | 'group'
const words = [
  // 한자 있는 것
  { type: 'normal', front: { main: '先生', size: '' }, back: { kana: 'せんせい', meaning: '선생님', sub: 'せい의 발음에 주의' } },
  { type: 'normal', front: { main: '大学', size: '' }, back: { kana: 'だいがく', meaning: '대학' } },
  { type: 'normal', front: { main: '二人', size: '' }, back: { kana: 'ふたり', meaning: '두 사람' } },
  { type: 'normal', front: { main: '一人', size: '' }, back: { kana: 'ひとり', meaning: '한 사람' } },
  { type: 'normal', front: { main: '研究員', size: '' }, back: { kana: 'けんきゅういん', meaning: '연구원' } },
  { type: 'normal', front: { main: '彼', size: '' }, back: { kana: 'かれ', meaning: '그 (남자)', sub: 'cf. 彼女(かのじょ): 그녀' } },
  { type: 'normal', front: { main: 'あのかた', size: '' }, back: { kana: 'あのかた', meaning: '저 분' } },
  { type: 'normal', front: { main: 'どの方', size: '' }, back: { kana: 'どのかた', meaning: '어느 분', sub: '연체사 + かた(분)' } },
  // 4개 묶음
  {
    type: 'group',
    front: { items: ['この', 'その', 'あの', 'どの'] },
    back: { items: [
      { jp: 'この', kr: '이 〜' },
      { jp: 'その', kr: '그 〜' },
      { jp: 'あの', kr: '저 〜' },
      { jp: 'どの', kr: '어느 〜' },
    ], sub: '연체사 — 뒤에 반드시 명사' }
  },
  {
    type: 'group',
    front: { items: ['こちら', 'そちら', 'あちら', 'どちら'] },
    back: { items: [
      { jp: 'こちら', kr: '이쪽' },
      { jp: 'そちら', kr: '그쪽' },
      { jp: 'あちら', kr: '저쪽' },
      { jp: 'どちら', kr: '어느쪽' },
    ], sub: '방향·사람 (정중)' }
  },
  // 히라가나만
  { type: 'normal', front: { main: 'どなた', size: '' }, back: { kana: 'どなた', meaning: '누구 (존경어)', sub: 'cf. どちらさま' } },
  { type: 'normal', front: { main: 'ともだち', size: '' }, back: { kana: 'ともだち', meaning: '친구', sub: '友達' } },
  { type: 'normal', front: { main: 'お名前', size: '' }, back: { kana: 'おなまえ', meaning: '성함', sub: '名前(이름)의 존경어' } },
  { type: 'normal', front: { main: 'なんですか', size: '' }, back: { kana: 'なんですか', meaning: '무엇입니까?', sub: 'なん + ですか' } },
  { type: 'normal', front: { main: 'お国', size: '' }, back: { kana: 'おくに', meaning: '출신, 고향, 국적', sub: 'お(존경 접두사) + 国' } },
  { type: 'normal', front: { main: '〜が', size: '' }, back: { kana: '〜が', meaning: '〜이/가', sub: '주격 조사' } },
  { type: 'normal', front: { main: 'なにか', size: '' }, back: { kana: 'なにか', meaning: '왜요, 무엇인가', sub: '何か' } },
  { type: 'normal', front: { main: 'ただ', size: '' }, back: { kana: 'ただ', meaning: '그냥, 공짜', sub: '無料(むりょう)' } },
  { type: 'normal', front: { main: '学生で', size: '' }, back: { kana: 'がくせいで', meaning: '학생이고', sub: 'です → で (중지법)' } },
];

let current = 0;
let flipped = false;

function render() {
  const w = words[current];
  const front = document.getElementById('cardFront');
  const back = document.getElementById('cardBack');

  if (w.type === 'group') {
    // 앞면 — 4개 그리드
    front.innerHTML = `
      <div class="front-group">
        ${w.front.items.map(item => `
          <div class="front-group-item">
            <div class="jp">${item}</div>
          </div>
        `).join('')}
      </div>
      <div class="front-hint">탭해서 의미 확인</div>
    `;
    // 뒷면
    back.innerHTML = `
      <div class="back-group">
        ${w.back.items.map(item => `
          <div class="back-group-item">
            <div class="jp">${item.jp}</div>
            <div class="kr">${item.kr}</div>
          </div>
        `).join('')}
      </div>
      ${w.back.sub ? `<div class="back-sub" style="margin-top:14px;">${w.back.sub}</div>` : ''}
    `;
  } else {
    const sizeClass = w.front.size ? w.front.size : '';
    front.innerHTML = `
      <div class="front-main ${sizeClass}">${w.front.main}</div>
      <div class="front-hint">탭해서 의미 확인</div>
    `;
    back.innerHTML = `
      <div class="back-kana">${w.back.kana}</div>
      <div class="back-meaning">${w.back.meaning}</div>
      ${w.back.sub ? `<div class="back-sub">${w.back.sub}</div>` : ''}
    `;
  }

  document.getElementById('cur').textContent = current + 1;
  document.getElementById('total').textContent = `/ ${words.length}`;
  document.getElementById('fill').style.width = `${((current + 1) / words.length) * 100}%`;
  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').textContent = current === words.length - 1 ? '완료' : '다음 ▶';

  if (flipped) {
    flipped = false;
    document.getElementById('cardInner').classList.remove('flipped');
  }
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('cardInner').classList.toggle('flipped');
}

function nextCard() {
  if (current < words.length - 1) {
    current++;
    render();
  } else {
    document.getElementById('cardArea').style.display = 'none';
    document.getElementById('tapHint').style.display = 'none';
    document.querySelector('.btn-row').style.display = 'none';
    document.querySelector('.progress-wrap').style.display = 'none';
    document.getElementById('doneScreen').classList.add('show');
  }
}

function prevCard() {
  if (current > 0) {
    current--;
    render();
  }
}

function restart() {
  current = 0;
  flipped = false;
  document.getElementById('cardArea').style.display = 'block';
  document.getElementById('tapHint').style.display = 'flex';
  document.querySelector('.btn-row').style.display = 'flex';
  document.querySelector('.progress-wrap').style.display = 'flex';
  document.getElementById('doneScreen').classList.remove('show');
  render();
}

let touchStartX = 0;
document.getElementById('cardArea').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('cardArea').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    if (dx < 0) nextCard();
    else prevCard();
  }
}, { passive: true });

render();
</script>
</body>
</html>
