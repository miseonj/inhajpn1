<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+KR:wght@300;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:#1a2a3a;font-family:'Noto Serif JP',serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:0 16px 40px;color:#fff;
  }
  header{width:100%;max-width:480px;padding:28px 0 16px;text-align:center;}
  .lesson-label{font-family:'Noto Sans KR',sans-serif;font-size:0.8rem;color:#7eb8c9;letter-spacing:0.15em;margin-bottom:6px;}
  header h1{font-size:1.4rem;font-weight:700;color:#fff;letter-spacing:0.05em;}
  .cats{width:100%;max-width:480px;display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 20px;}
  .cat-btn{
    background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);
    color:#ccc;padding:7px 16px;border-radius:20px;
    font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;cursor:pointer;transition:all 0.2s;
  }
  .cat-btn.active{background:#7eb8c9;border-color:#7eb8c9;color:#fff;font-weight:700;}
  .section-label{
    width:100%;max-width:480px;
    font-family:'Noto Sans KR',sans-serif;font-size:0.75rem;color:#7eb8c9;
    letter-spacing:0.1em;margin-bottom:12px;padding:4px 12px;
    background:rgba(126,184,201,0.15);border-radius:4px;
  }
  .card{
    width:100%;max-width:480px;min-height:280px;background:#fff;border-radius:20px;
    box-shadow:0 4px 24px rgba(0,0,0,0.25);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:40px 24px;cursor:pointer;text-align:center;
    margin-bottom:20px;user-select:none;border-left:5px solid #c9a84c;
  }
  .emoji{font-size:2.2rem;margin-bottom:10px;}
  .front-text{font-size:3.2rem;font-weight:700;color:#1a2a3a;letter-spacing:0.05em;line-height:1.3;}
  .divider{width:48px;height:2px;background:#7eb8c9;margin:14px auto;display:none;}
  .revealed .divider{display:block;}
  .hira-text{font-size:1.4rem;font-weight:700;color:#1a2a3a;letter-spacing:0.08em;display:none;}
  .revealed .hira-text{display:block;}
  .ko-text{font-family:'Noto Sans KR',sans-serif;font-size:1.15rem;font-weight:500;color:#555;display:none;margin-top:4px;}
  .revealed .ko-text{display:block;}
  .audio-wrap{display:none;margin-top:16px;}
  .revealed .audio-wrap{display:block;}
  .audio-btn{
    width:48px;height:48px;border-radius:50%;background:#1a2a3a;
    border:none;color:#fff;font-size:1.2rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto;transition:background 0.2s;
  }
  .audio-btn:hover{background:#2d4a5a;}
  .nav{display:flex;align-items:center;gap:16px;width:100%;max-width:480px;margin-bottom:16px;}
  .nav button{
    width:52px;height:52px;border-radius:50%;
    background:rgba(255,255,255,0.15);border:none;color:#fff;
    font-size:1.2rem;cursor:pointer;transition:background 0.2s;flex-shrink:0;
  }
  .nav button:hover{background:rgba(255,255,255,0.25);}
  .nav button:disabled{opacity:0.2;cursor:default;}
  .nav-info{flex:1;text-align:center;font-family:'Noto Sans KR',sans-serif;font-size:1rem;font-weight:700;color:#fff;}
  .nav-info span{color:#c9a84c;}
  .progress-bar{width:100%;max-width:480px;height:3px;background:rgba(255,255,255,0.15);border-radius:2px;margin-bottom:8px;}
  .progress-fill{height:100%;background:linear-gradient(90deg,#c9a84c,#7eb8c9);border-radius:2px;transition:width 0.3s ease;}
  .hint-text{font-family:'Noto Sans KR',sans-serif;font-size:0.72rem;color:rgba(255,255,255,0.35);text-align:center;letter-spacing:0.05em;}
  .done{text-align:center;padding:60px 20px;font-family:'Noto Sans KR',sans-serif;}
  .done h2{font-size:1.8rem;color:#c9a84c;margin-bottom:12px;}
  .done p{color:#aaa;font-size:0.9rem;margin-bottom:24px;}
  .restart-btn{background:#c9a84c;border:none;color:#fff;padding:14px 32px;border-radius:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:0.95rem;}
</style>

];

let filtered = [...allWords];
let current = 0;
let revealed = false;

function setCat(cat, btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtered = cat === '전체' ? [...allWords] : allWords.filter(w => w.cat === cat);
  current = 0;
  render();
}

function playAudio() {
  if (!filtered[current]) return;
  new Audio(filtered[current].audio).play().catch(()=>{});
}

function render() {
  const main = document.getElementById('main');
  const navInfo = document.getElementById('nav-info');
  const fill = document.getElementById('fill');
  const prevBtn = document.getElementById('prev-btn');

  if (current >= filtered.length) {
    main.innerHTML = `<div class="done"><h2>완료! 🎉</h2><p>${filtered.length}개 완주!</p><button class="restart-btn" onclick="restart()">처음부터 다시</button></div>`;
    navInfo.innerHTML = '';
    fill.style.width = '100%';
    return;
  }

  const w = filtered[current];
  revealed = false;
  navInfo.innerHTML = `<span>${current+1}</span> / ${filtered.length}`;
  fill.style.width = `${(current/filtered.length)*100}%`;
  prevBtn.disabled = current === 0;

  const frontText = w.kanji || w.hira;
  const hiraLine = w.kanji ? `<div class="hira-text">${w.hira}</div>` : '';

  main.innerHTML = `
    <div class="card" id="card" onclick="revealCard()">
      <div class="emoji">${w.emoji}</div>
      <div class="front-text">${frontText}</div>
      <div class="divider"></div>
      ${hiraLine}
      <div class="ko-text">${w.ko}</div>
      <div class="audio-wrap">
        <button class="audio-btn" onclick="event.stopPropagation();playAudio()">🔊</button>
      </div>
    </div>
  `;

  setTimeout(() => playAudio(), 300);
}

function revealCard() {
  if (revealed) return;
  revealed = true;
  document.getElementById('card').classList.add('revealed');
}

function next() { current++; render(); }
function prev() { if (current > 0) { current--; render(); } }
function restart() { current = 0; render(); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); if(!revealed) revealCard(); else next(); }
  if (e.key === 'ArrowLeft') prev();
  if (e.key === 'r' || e.key === 'R') playAudio();
});

render();
</script>
