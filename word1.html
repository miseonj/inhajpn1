<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>word1 — 1과 단어</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Sans+KR:wght@400;700&family=Shippori+Mincho:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1A3550;
    --teal: #28B4A6;
    --orange: #E67E22;
    --white: #ffffff;
    --paper: #faf6ee;
    --light: #eee8d8;
    --muted: #8a7e6f;
    --ink: #2a1a08;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 0 0 40px;
  }

  /* 헤더 */
  header {
    width: 100%;
    text-align: center;
    padding: 28px 20px 16px;
  }
  header .label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--teal);
    font-weight: 700;
    margin-bottom: 6px;
  }
  header h1 {
    font-size: 22px;
    font-weight: 900;
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 2px;
  }

  /* 진행 표시 */
  .progress-wrap {
    width: 100%;
    max-width: 400px;
    padding: 0 24px;
    margin-bottom: 20px;
  }
  .progress-text {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 8px;
  }
  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--teal);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* 카드 영역 */
  .card-area {
    width: 100%;
    max-width: 400px;
    padding: 0 24px;
    perspective: 1000px;
    margin-bottom: 24px;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 260px;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }
  .card-inner.flipped {
    transform: rotateY(180deg);
  }

  .card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .card-front {
    background: var(--white);
    border-left: 6px solid var(--teal);
  }
  .card-back {
    background: var(--paper);
    border-left: 6px solid var(--orange);
    transform: rotateY(180deg);
  }

  /* 앞면 */
  .front-kanji {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 56px;
    font-weight: 900;
    color: var(--navy);
    line-height: 1.3;
    text-align: center;
    margin-bottom: 8px;
  }
  .front-kana {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 42px;
    font-weight: 900;
    color: var(--navy);
    line-height: 1.4;
    text-align: center;
    margin-bottom: 8px;
  }
  .front-hint {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 12px;
  }

  /* 뒷면 */
  .back-kana {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--teal);
    margin-bottom: 16px;
    text-align: center;
    line-height: 1.4;
  }
  .back-meaning {
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    text-align: center;
    line-height: 1.5;
  }
  .back-sub {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-top: 10px;
    line-height: 1.6;
  }

  /* 탭 안내 */
  .tap-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  /* 버튼 */
  .btn-row {
    display: flex;
    gap: 16px;
    width: 100%;
    max-width: 400px;
    padding: 0 24px;
  }
  .btn {
    flex: 1;
    padding: 16px;
    border-radius: 16px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn:active { transform: scale(0.96); }
  .btn-prev {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-prev:hover { background: rgba(255,255,255,0.13); }
  .btn-next {
    background: var(--teal);
    color: white;
  }
  .btn-next:hover { background: #22a096; }
  .btn-next:disabled {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.3);
    cursor: default;
  }

  /* 완료 화면 */
  .done-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }
  .done-screen.show { display: flex; }
  .done-emoji { font-size: 64px; margin-bottom: 20px; }
  .done-title {
    font-size: 28px;
    font-weight: 900;
    color: var(--white);
    font-family: 'Shippori Mincho', serif;
    margin-bottom: 10px;
  }
  .done-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 32px;
  }
  .btn-restart {
    padding: 16px 40px;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .card-area, .btn-row, .tap-hint, .progress-wrap { display: flex; }
  .card-area { display: block; }
</style>
</head>
<body>

<header>
  <div class="label">日本語練習１</div>
  <h1>1과 단어</h1>
</header>

<div class="progress-wrap">
  <div class="progress-text">
    <span id="cur">1</span><span id="total"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
</div>

<div class="card-area" id="cardArea">
  <div class="card-inner" id="cardInner" onclick="flipCard()">
    <div class="card-front" id="cardFront"></div>
    <div class="card-back" id="cardBack"></div>
  </div>
</div>

<div class="tap-hint" id="tapHint">탭해서 뒤집기</div>

<div class="btn-row">
  <button class="btn btn-prev" id="btnPrev" onclick="prevCard()">◀ 이전</button>
  <button class="btn btn-next" id="btnNext" onclick="nextCard()">다음 ▶</button>
</div>

<div class="done-screen" id="doneScreen">
  <div class="done-emoji">✓</div>
  <div class="done-title">완료!</div>
  <div class="done-sub">1과 단어 21개 완주했어요</div>
  <button class="btn-restart" onclick="restart()">처음부터 다시</button>
</div>

<script>
const words = [
  { front: { kanji: '学生', kana: 'がくせい' }, back: { kana: 'がくせい', meaning: '학생' } },
  { front: { kanji: '留学生', kana: 'りゅうがくせい' }, back: { kana: 'りゅうがくせい', meaning: '유학생' } },
  { front: { kanji: '会社員', kana: 'かいしゃいん' }, back: { kana: 'かいしゃいん', meaning: '회사원' } },
  { front: { kanji: '韓国人', kana: 'かんこくじん' }, back: { kana: 'かんこくじん', meaning: '한국인' } },
  { front: { kanji: 'フランス人', kana: 'フランスじん' }, back: { kana: 'フランスじん', meaning: '프랑스인' } },
  { front: { kanji: '中国の<br>かた', kana: 'ちゅうごくのかた' }, back: { kana: 'ちゅうごくのかた', meaning: '중국 분' } },
  { front: { kanji: '韓国の<br>かた', kana: 'かんこくのかた' }, back: { kana: 'かんこくのかた', meaning: '한국 분' } },
  { front: { kanji: 'フランスの<br>かた', kana: 'フランスのかた' }, back: { kana: 'フランスのかた', meaning: '프랑스 분' } },
  { front: { kana: 'はじめまして' }, back: { kana: 'はじめまして', meaning: '처음 뵙겠습니다', sub: '첫인사' } },
  { front: { kana: 'どうぞよろしく' }, back: { kana: 'どうぞよろしく', meaning: '잘 부탁드립니다', sub: '관용적인 인사말' } },
  { front: { kana: 'よろしく<br>おねがいします' }, back: { kana: 'よろしくおねがいします', meaning: '잘 부탁하겠습니다', sub: '관용적인 인사말' } },
  { front: { kana: 'こちらこそ' }, back: { kana: 'こちらこそ', meaning: '이쪽이야말로', sub: '저야말로' } },
  { front: { kana: '〜さん' }, back: { kana: '〜さん', meaning: '〜씨, 〜님', sub: '호칭 접미사' } },
  { front: { kana: '〜は' }, back: { kana: '〜は', meaning: '〜은/는', sub: '부조사 (wa로 발음)' } },
  { front: { kana: '〜ですか' }, back: { kana: '〜ですか', meaning: '〜입니까?', sub: '의문문' } },
  { front: { kana: 'はい' }, back: { kana: 'はい', meaning: '예', sub: '긍정의 응답사' } },
  { front: { kana: 'いいえ' }, back: { kana: 'いいえ', meaning: '아니오', sub: '부정의 응답사' } },
  { front: { kana: 'わたし' }, back: { kana: 'わたし', meaning: '저/나', sub: '1인칭 대명사' } },
  { front: { kana: 'あのう' }, back: { kana: 'あのう', meaning: '저〜', sub: '감탄사 (말을 꺼낼 때)' } },
  { front: { kana: '〜も' }, back: { kana: '〜も', meaning: '〜도', sub: '부조사 (첨가)' } },
  { front: { kana: '〜では<br>ありません' }, back: { kana: '〜ではありません', meaning: '〜이/가 아닙니다', sub: '명사 부정' } },
];

let current = 0;
let flipped = false;

function render() {
  const w = words[current];
  const front = document.getElementById('cardFront');
  const back = document.getElementById('cardBack');

  // 앞면
  if (w.front.kanji) {
    front.innerHTML = `
      <div class="front-kanji">${w.front.kanji}</div>
      <div class="front-hint">탭해서 읽기 확인</div>
    `;
  } else {
    front.innerHTML = `
      <div class="front-kana">${w.front.kana}</div>
      <div class="front-hint">탭해서 의미 확인</div>
    `;
  }

  // 뒷면
  back.innerHTML = `
    <div class="back-kana">${w.back.kana}</div>
    <div class="back-meaning">${w.back.meaning}</div>
    ${w.back.sub ? `<div class="back-sub">${w.back.sub}</div>` : ''}
  `;

  // 진행
  document.getElementById('cur').textContent = current + 1;
  document.getElementById('total').textContent = `/ ${words.length}`;
  document.getElementById('fill').style.width = `${((current + 1) / words.length) * 100}%`;
  document.getElementById('btnPrev').disabled = current === 0;

  // 뒤집기 초기화
  if (flipped) {
    flipped = false;
    document.getElementById('cardInner').classList.remove('flipped');
  }

  // 마지막 카드
  const btnNext = document.getElementById('btnNext');
  btnNext.textContent = current === words.length - 1 ? '완료' : '다음 ▶';
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('cardInner').classList.toggle('flipped');
}

function nextCard() {
  if (current < words.length - 1) {
    current++;
    render();
  } else {
    // 완료
    document.getElementById('cardArea').style.display = 'none';
    document.getElementById('tapHint').style.display = 'none';
    document.querySelector('.btn-row').style.display = 'none';
    document.querySelector('.progress-wrap').style.display = 'none';
    document.getElementById('doneScreen').classList.add('show');
  }
}

function prevCard() {
  if (current > 0) {
    current--;
    render();
  }
}

function restart() {
  current = 0;
  flipped = false;
  document.getElementById('cardArea').style.display = 'block';
  document.getElementById('tapHint').style.display = 'flex';
  document.querySelector('.btn-row').style.display = 'flex';
  document.querySelector('.progress-wrap').style.display = 'flex';
  document.getElementById('doneScreen').classList.remove('show');
  render();
}

// 스와이프 지원
let touchStartX = 0;
document.getElementById('cardArea').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('cardArea').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    if (dx < 0) nextCard();
    else prevCard();
  }
}, { passive: true });

render();
</script>
</body>
</html>
